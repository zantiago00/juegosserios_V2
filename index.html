<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Serio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">

        <div class="card profile-card">
            <img src="assets/images/04.perfil.png" alt="04.perfil.png">
        </div>

        <div class="card info-card">
            <p class="user-name">Santiago Betancur Zapata</p>
            <p class="user-handle">Balthazar 00</p>
        </div>

        <div class="actions-container">
            <button class="action-btn">CREAR</button>
            <button class="action-btn">EVALUAR</button>
            <button class="action-btn">ANALIZAR</button>
            <button class="action-btn">APLICAR</button>
            <button class="action-btn">COMPRENDER</button>
            <button class="action-btn">RECORDAR</button>
        </div>

        <footer class="icon-bar">
            <button class="icon-btn">
                <img src="assets/images/02.mano.png" alt="Icono de mano">
            </button>
            <button class="icon-btn">
                <img src="assets/images/01.joy.png" alt="Icono de joystick">
            </button>
            <button class="icon-btn">
                <img src="assets/images/03.ranking.png" alt="Icono de organigrama">
            </button>
        </footer>

    </div>

</body>
</html>
